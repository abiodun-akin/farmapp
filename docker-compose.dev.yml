version: '3.9'

networks:
  farmconnect-dev:
    driver: bridge

services:
  # ==================
  # React Frontend (Development)
  # ==================
  farmapp:
    build:
      context: .
      dockerfile: Dockerfile.react
      target: development
    container_name: farmapp-dev
    environment:
      - VITE_API_URL=http://localhost:8888/api
      - VITE_PAYSTACK_PUBLIC_KEY=${VITE_PAYSTACK_PUBLIC_KEY:-pk_test_dummy}
      - NODE_ENV=development
    volumes:
      - ./src:/usr/src/app/src
      - ./public:/usr/src/app/public
      - ./vite.config.js:/usr/src/app/vite.config.js
      - ./index.html:/usr/src/app/index.html
      - /usr/src/app/node_modules
    networks:
      - farmconnect-dev
    ports:
      - "5173:5173"  # Vite dev server
    command: npm run dev
    restart: unless-stopped
    healthcheck:
      test: wget -qO- http://localhost:5173 || exit 1
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ==================
  # Build Server (for testing builds)
  # ==================
  farmapp-build:
    build:
      context: .
      dockerfile: Dockerfile.react
      target: build
    container_name: farmapp-build-dev
    environment:
      - VITE_API_URL=http://localhost:8888/api
      - VITE_PAYSTACK_PUBLIC_KEY=${VITE_PAYSTACK_PUBLIC_KEY:-pk_test_dummy}
      - NODE_ENV=development
    volumes:
      - ./src:/usr/src/app/src
      - ./public:/usr/src/app/public
      - ./dist:/usr/src/app/dist
      - /usr/src/app/node_modules
    networks:
      - farmconnect-dev
    command: npm run build
    profiles:
      - build

  # ==================
  # Test Service
  # ==================
  test:
    build:
      context: .
      dockerfile: Dockerfile.react
      target: development
    container_name: farmapp-test
    environment:
      - VITE_API_URL=http://localhost:8888/api
      - VITE_PAYSTACK_PUBLIC_KEY=${VITE_PAYSTACK_PUBLIC_KEY:-pk_test_dummy}
      - NODE_ENV=test
    volumes:
      - ./src:/usr/src/app/src
      - ./public:/usr/src/app/public
      - /usr/src/app/node_modules
    networks:
      - farmconnect-dev
    command: npm run test:cov
    profiles:
      - test
