version: '3.8'

networks:
  farmconnect-prod:
    driver: bridge

services:
  # ==================
  # React Frontend (Production)
  # ==================
  farmapp:
    build:
      context: .
      dockerfile: Dockerfile.react
      args:
        VITE_API_URL: ${VITE_API_URL:-https://api.farmconnect.app/api}
        VITE_PAYSTACK_PUBLIC_KEY: ${VITE_PAYSTACK_PUBLIC_KEY}
      target: production
    container_name: farmapp-prod
    networks:
      - farmconnect-prod
    ports:
      - "80:80"
      - "443:443"
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: wget -qO- http://localhost:80 || exit 1
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    security_opt:
      - no-new-privileges:true
    labels:
      - "com.example.description=FarmConnect React Frontend"
